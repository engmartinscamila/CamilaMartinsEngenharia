<header class="topbar">


<div>


<h2>

Configurações

</h2>



<p>

Gerenciamento das informações do sistema

</p>


</div>



</header>









<section class="card-grande">



<div class="card-header">


<h2>

Dados da Empresa

</h2>



</div>







<form
id="formConfiguracoes">



<div class="form-grid">





<div class="campo">


<label>

Nome da Empresa

</label>



<input
id="empresaNome">



</div>








<div class="campo">


<label>

CNPJ

</label>



<input
id="empresaCnpj">



</div>








<div class="campo">


<label>

Telefone

</label>



<input
id="empresaTelefone">



</div>








<div class="campo">


<label>

E-mail

</label>



<input
id="empresaEmail"
type="email">



</div>








<div class="campo campo-full">


<label>

Endereço

</label>



<input
id="empresaEndereco">



</div>








<div class="campo">


<label>

Cidade

</label>



<input
id="empresaCidade">



</div>








<div class="campo">


<label>

Estado

</label>



<input
id="empresaEstado">



</div>








<div class="campo">


<label>

CREA

</label>



<input
id="empresaCrea">



</div>








<div class="campo campo-full">


<label>

Descrição / Apresentação

</label>



<textarea
id="empresaDescricao"
rows="5">

</textarea>



</div>



</div>
<section class="card-grande">



<div class="card-header">


<h2>

Preferências do Sistema

</h2>



</div>







<div class="form-grid">





<div class="campo">


<label>

Cor principal

</label>



<input
type="color"
id="sistemaCorPrincipal">



</div>








<div class="campo">


<label>

Tema

</label>



<select
id="sistemaTema">


<option value="claro">

Claro

</option>



<option value="escuro">

Escuro

</option>



</select>



</div>








<div class="campo">


<label>

Notificações

</label>



<select
id="sistemaNotificacoes">


<option value="ativo">

Ativadas

</option>



<option value="inativo">

Desativadas

</option>



</select>



</div>






</div>






</section>









<section class="card-grande">



<div class="card-header">


<h2>

Backup e Segurança

</h2>



</div>

<button
type="button"
id="gerarBackup">


<i class="fa-solid fa-database"></i>


Gerar Backup


</button>






<button
type="button"
id="limparCache">


<i class="fa-solid fa-broom"></i>


Limpar Cache


</button>



</div>



</section>








<div class="modal-footer">



<button
type="submit"
id="salvarConfiguracoes">


Salvar Configurações


</button>
