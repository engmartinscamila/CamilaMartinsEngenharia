<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Biblioteca | Camila Martins Engenharia</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/biblioteca.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo-area">

            <img src="img/logo-branca.png" alt="Logo">

        </div>

        <nav>

            <a href="portal.html">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>

            <a href="meu-projeto.html">
                <i class="fa-solid fa-building"></i>
                Meu Projeto
            </a>

            <a href="cronograma.html">
                <i class="fa-solid fa-calendar-check"></i>
                Cronograma
            </a>

            <a href="fotos.html">
                <i class="fa-solid fa-camera"></i>
                Fotos
            </a>

            <a href="documentos.html">
                <i class="fa-solid fa-folder-open"></i>
                Documentos
            </a>

            <a class="active" href="biblioteca.html">
                <i class="fa-solid fa-book"></i>
                Biblioteca
            </a>

            <a href="solicitacoes.html">
                <i class="fa-solid fa-comments"></i>
                Solicitações
            </a>

        </nav>

    </aside>

    <!-- CONTEÚDO -->

    <main class="content">

        <header class="topbar">

            <div>

                <h1>Biblioteca Premium</h1>

                <p>Materiais exclusivos para consulta e download.</p>

            </div>

            <button
                class="btn-primary"
                onclick="document.getElementById('modalBiblioteca').classList.add('show')">

                <i class="fa-solid fa-plus"></i>

                Novo Material

            </button>

        </header>

        <!-- PESQUISA -->

        <section class="toolbar">

            <div class="search">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    placeholder="Pesquisar material..."
                    onkeyup="pesquisarBiblioteca(this.value)">

            </div>

        </section>

        <!-- LISTA -->

        <section
            id="listaBiblioteca"
            class="biblioteca-grid">

        </section>

    </main>

</div>

<!-- MODAL -->

<div
    id="modalBiblioteca"
    class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Novo Material</h2>

            <button
                class="close"
                onclick="document.getElementById('modalBiblioteca').classList.remove('show')">

                &times;

            </button>

        </div>

        <form id="formBiblioteca">

            <div class="form-group">

                <label>Título</label>

                <input
                    id="tituloBiblioteca"
                    type="text"
                    required>

            </div>

            <div class="form-group">

                <label>Categoria</label>

                <select
                    id="categoriaBiblioteca"
                    required>

                    <option value="">Selecione</option>
                    <option>Checklist</option>
                    <option>Manual</option>
                    <option>Guia</option>
                    <option>Projeto</option>
                    <option>PDF</option>
                    <option>Vídeo</option>
                    <option>Outros</option>

                </select>

            </div>

            <div class="form-group">

                <label>Descrição</label>

                <textarea
                    id="descricaoBiblioteca"
                    rows="4"></textarea>

            </div>

            <div class="form-group">

                <label>Arquivo</label>

                <input
                    id="arquivoBiblioteca"
                    type="file"
                    required>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn-secondary"
                    onclick="document.getElementById('modalBiblioteca').classList.remove('show')">

                    Cancelar

                </button>

                <button
                    class="btn-primary"
                    type="submit">

                    Salvar Material

                </button>

            </div>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/biblioteca.js"></script>

</body>

</html>
