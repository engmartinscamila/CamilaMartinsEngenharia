<button
id="logoutButton"
class="btn-sair">


<i class="fa-solid fa-right-from-bracket"></i>


Sair


</button>



</aside>
<main class="conteudo">



<header class="topbar">


<div>


<h2>

Fotos

</h2>



<p>

Galeria de imagens dos projetos

</p>


</div>




<div class="acoes-topo">


<button id="novaFoto">


<i class="fa-solid fa-image"></i>


Nova Foto


</button>



</div>



</header>









<section class="card-grande">



<div class="card-header">


<h2>

Galeria

</h2>




<div class="acoes-card">


<input
type="search"
id="pesquisaFoto"
placeholder="Pesquisar foto...">



<button
id="btnPesquisarFoto">


<i class="fa-solid fa-search"></i>


</button>



</div>



</div>








<div
id="galeriaFotos"
class="galeria-fotos">


</div>



</section>









<!-- MODAL FOTO -->



<div
id="modalFoto"
class="modal">



<div class="modal-content">



<div class="modal-header">


<h2>

Adicionar Foto

</h2>




<button
id="fecharModalFoto">


<i class="fa-solid fa-xmark"></i>


</button>



</div>







<form
id="formFoto">



<div class="form-grid">





<div class="campo">


<label>

Projeto

</label>



<select
id="fotoProjeto">


<option value="">

Selecione o projeto

</option>


</select>



</div>







<div class="campo">


<label>

Cliente

</label>



<select
id="fotoCliente"
required>


<option value="">

Selecione o cliente

</option>


</select>



</div>








<div class="campo campo-full">


<label>

Título da Foto

</label>



<input
id="fotoTitulo"
required>

<label for="fotoDescricao">

Descrição

</label>

<textarea
id="fotoDescricao"></textarea>



</div>








<div class="campo campo-full">


<label>

Imagem

</label>



<input
type="file"
id="arquivoFoto"
accept="image/*"
required>



</div>
<div class="modal-footer">


<button
type="button"
id="cancelarFoto">

Cancelar

</button>




<button
type="submit"
id="salvarFoto">

Salvar Foto

</button>



</div>



</form>



</div>



</div>









<!-- DETALHES DA FOTO -->



<section class="painel-principal">



<div class="card-grande">



<div class="card-header">


<h2>

Detalhes da Foto

</h2>



</div>





<div
id="detalhesFoto"
class="detalhes">


<p>

Selecione uma imagem para visualizar os detalhes.

</p>



</div>



</div>





</section>

</p>
