<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Painel Administrativo | Camila Martins Engenharia
    </title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Parisienne&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="css/admin.css"
    >
</head>

<body>

    <header class="topbar">

        <div class="brand">
            <span class="signature">
                Camila Martins
            </span>

            <span class="subtitle">
                ENGENHARIA
            </span>
        </div>

        <nav class="menu">

            <a href="#">
                Dashboard
            </a>

            <a href="#">
                Clientes
            </a>

            <a href="#">
                Projetos
            </a>

            <a href="#">
                Documentos
            </a>

            <a href="#">
                Fotos
            </a>

            <button
                type="button"
                id="logoutButton"
            >
                Sair
            </button>

        </nav>

    </header>

    <main class="container">

        <section class="hero">

            <h1>
                Painel Administrativo
            </h1>

            <p>
                Bem-vinda,
                <span id="adminName">
                    Camila
                </span>.
            </p>

        </section>

        <section class="dashboard-cards">

            <article class="card">
                <h2>Clientes</h2>
                <span id="totalClientes">0</span>
            </article>

            <article class="card">
                <h2>Projetos</h2>
                <span id="totalProjetos">0</span>
            </article>

            <article class="card">
                <h2>Documentos</h2>
                <span id="totalDocumentos">0</span>
            </article>

            <article class="card">
                <h2>Fotos</h2>
                <span id="totalFotos">0</span>
            </article>

        </section>

        <section class="clientes">

            <div class="toolbar">

                <input
                    type="search"
                    id="pesquisaCliente"
                    placeholder="Pesquisar cliente..."
                >

                <button
                    type="button"
                    id="novoCliente"
                >
                    + Novo Cliente
                </button>

            </div>

            <div id="listaClientes"></div>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/clientes.js"></script>
    <script src="js/documentos.js"></script>
    <script src="js/admin.js"></script>

</body>
</html>
