<button id="logoutButton" class="btn-sair">

<i class="fa-solid fa-right-from-bracket"></i>

Sair

</button>


</aside>



<main class="conteudo">



<header class="topbar">

<div>

<h2>
Clientes
</h2>

<p>
Gerenciamento de clientes
</p>

</div>


<button id="novoCliente">

<i class="fa-solid fa-user-plus"></i>

Novo Cliente

</button>


</header>



<section class="card-grande">


<div class="card-header">


<h2>
Lista de Clientes
</h2>


<div class="acoes-card">


<input
type="search"
id="pesquisarClientes"
placeholder="Pesquisar cliente...">


<button id="btnPesquisarClientes">

<i class="fa-solid fa-search"></i>

</button>


</div>


</div>



<table class="tabela">


<thead>

<tr>

<th>Nome</th>

<th>Telefone</th>

<th>Email</th>

<th>Cidade</th>

<th>Estado</th>

<th>Status</th>

<th>Ações</th>

</tr>

</thead>


<tbody id="tabelaClientes">


</tbody>


</table>


</section>



</main>


</div>





<div id="modalCliente" class="modal">


<div class="modal-content">


<div class="modal-header">

<h2>
Novo Cliente
</h2>


<button id="fecharModalCliente">

<i class="fa-solid fa-xmark"></i>

</button>

</div>



<form id="formCliente">


<input id="clienteNome" placeholder="Nome completo" required>

<input id="clienteCpf" placeholder="CPF/CNPJ">

<input id="clienteTelefone" placeholder="Telefone">

<input id="clienteEmail" placeholder="E-mail">

<input id="clienteEndereco" placeholder="Endereço">

<input id="clienteCidade" placeholder="Cidade">

<input id="clienteEstado" placeholder="Estado">

<input id="clienteCep" placeholder="CEP">


<select id="clienteStatus">

<option value="ativo">
Ativo
</option>

<option value="orcamento">
Orçamento
</option>

<option value="pausado">
Pausado
</option>

<option value="concluido">
Concluído
</option>


</select>



<textarea
id="clienteObservacoes"
placeholder="Observações">
</textarea>



<button
type="submit"
id="salvarCliente">

Salvar Cliente

</button>



</form>



</div>


</div>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

<script src="js/clientes.js"></script>

  <script>

document.getElementById("novoCliente")?.addEventListener("click", () => {

    document
    .getElementById("modalCliente")
    .classList.add("show");

});


document.getElementById("fecharModalCliente")?.addEventListener("click", () => {

    document
    .getElementById("modalCliente")
    .classList.remove("show");

});


document.getElementById("logoutButton")?.addEventListener("click", async () => {

    await supabase.auth.signOut();

    location.href="login.html";

});


</script>

</body>
