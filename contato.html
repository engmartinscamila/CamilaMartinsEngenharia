<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="Entre em contato com Camila Martins Engenharia Civil."
  />

  <title>Contato | Camila Martins Engenharia Civil</title>

  <link rel="icon" href="assets/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <link rel="stylesheet" href="css/styles.css" />

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(rgba(8, 22, 38, 0.88), rgba(8, 22, 38, 0.94)),
        url("assets/images/foto-camila.jpg") center top / cover fixed;
    }

    .contact-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 45px 20px;
    }

    .virtual-card {
      width: 100%;
      max-width: 480px;
      padding: 42px 32px 32px;
      text-align: center;
      background: rgba(250, 249, 246, 0.97);
      border: 1px solid rgba(193, 163, 98, 0.45);
      box-shadow: 0 24px 65px rgba(0, 0, 0, 0.32);
      border-radius: 4px;
    }

    .virtual-logo {
      width: 92px;
      height: 92px;
      margin: 0 auto 20px;
      display: block;
      object-fit: contain;
    }

    .virtual-card h1 {
      margin: 0;
      color: #10263d;
      font-family: "Parisienne", cursive;
      font-size: clamp(42px, 10vw, 58px);
      font-weight: 400;
      line-height: 1;
    }

    .profession {
      margin: 10px 0 5px;
      color: #10263d;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .crea {
      margin: 0 0 24px;
      color: #707070;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .divider {
      width: 65px;
      height: 1px;
      margin: 0 auto 25px;
      background: #b49557;
    }

    .intro {
      max-width: 370px;
      margin: 0 auto 28px;
      color: #555;
      font-size: 15px;
      line-height: 1.7;
    }

    .contact-buttons {
      display: grid;
      gap: 12px;
    }

    .contact-buttons a {
      min-height: 58px;
      padding: 10px 18px;
      display: grid;
      grid-template-columns: 28px 1fr 28px;
      align-items: center;
      color: #10263d;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      background: transparent;
      border: 1px solid rgba(16, 38, 61, 0.35);
      transition: 0.25s ease;
    }

    .contact-buttons a i:first-child {
      font-size: 21px;
      color: #b49557;
    }

    .contact-buttons a .arrow {
      font-size: 15px;
      color: #10263d;
    }

    .contact-buttons a:hover {
      color: #fff;
      background: #10263d;
      border-color: #10263d;
      transform: translateY(-2px);
    }

    .contact-buttons a:hover .arrow {
      color: #fff;
    }

    .back-site {
      margin-top: 28px;
    }

    .back-site a {
      color: #777;
      font-size: 12px;
      letter-spacing: 1px;
      text-decoration: none;
      text-transform: uppercase;
    }

    .back-site a:hover {
      color: #10263d;
    }

    .virtual-footer {
      margin-top: 25px;
      color: #999;
      font-size: 11px;
      letter-spacing: 0.7px;
    }

    @media (max-width: 520px) {
      .contact-page {
        padding: 20px 14px;
      }

      .virtual-card {
        padding: 35px 20px 26px;
      }

      .virtual-card h1 {
        font-size: 45px;
      }

      .profession {
        font-size: 12px;
        letter-spacing: 3px;
      }
    }
  </style>
</head>

<body>
  <main class="contact-page">

    <section class="virtual-card">

      <img
        class="virtual-logo"
        src="assets/logo.png"
        alt="Logomarca Camila Martins Engenharia Civil"
      />

      <h1>Camila Martins</h1>

      <p class="profession">Engenharia Civil</p>

      <p class="crea">CREA-RJ 2023511771</p>

      <div class="divider"></div>

      <p class="intro">
        Projetos desenvolvidos com precisão técnica, funcionalidade,
        estética e cuidado em cada detalhe.
      </p>

      <div class="contact-buttons">

        <a
          href="https://wa.me/5521986429999?text=Ol%C3%A1%20Camila!%20Conheci%20seu%20cart%C3%A3o%20virtual%20e%20gostaria%20de%20solicitar%20um%20or%C3%A7amento."
          target="_blank"
          rel="noopener"
        >
          <i class="bi bi-whatsapp"></i>
          <span>WhatsApp</span>
          <i class="bi bi-arrow-up-right arrow"></i>
        </a>

        <a
          href="mailto:eng.martins.camila@gmail.com?subject=Solicita%C3%A7%C3%A3o%20de%20or%C3%A7amento"
        >
          <i class="bi bi-envelope"></i>
          <span>E-mail</span>
          <i class="bi bi-arrow-up-right arrow"></i>
        </a>

        <a
          href="https://www.instagram.com/eng.martins.camila"
          target="_blank"
          rel="noopener"
        >
          <i class="bi bi-instagram"></i>
          <span>Instagram</span>
          <i class="bi bi-arrow-up-right arrow"></i>
        </a>

        <a href="portfolio.html">
          <i class="bi bi-images"></i>
          <span>Portfólio</span>
          <i class="bi bi-arrow-up-right arrow"></i>
        </a>

        <a href="index.html">
          <i class="bi bi-globe2"></i>
          <span>Site oficial</span>
          <i class="bi bi-arrow-up-right arrow"></i>
        </a>

      </div>

      <div class="back-site">
        <a href="index.html">
          <i class="bi bi-arrow-left"></i>
          Voltar ao site
        </a>
      </div>

      <p class="virtual-footer">
        © 2026 Camila Martins Engenharia Civil
      </p>

    </section>

  </main>
</body>
</html>
