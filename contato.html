<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    name="description"
    content="Cartão de contato virtual de Camila Martins Engenharia Civil."
  />

  <title>Contato | Camila Martins Engenharia Civil</title>

  <link rel="icon" href="assets/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: #f4f6f8;
      font-family: Arial, Helvetica, sans-serif;

      background:
        radial-gradient(
          circle at 50% 20%,
          rgba(212, 176, 106, 0.12),
          transparent 28%
        ),
        radial-gradient(
          circle at 10% 85%,
          rgba(255, 255, 255, 0.05),
          transparent 30%
        ),
        linear-gradient(
          145deg,
          #071522 0%,
          #0b1f33 52%,
          #071522 100%
        );
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;

      background:
        linear-gradient(
          rgba(4, 14, 24, 0.55),
          rgba(4, 14, 24, 0.7)
        ),
        url("assets/images/foto-camila.jpg") center / cover no-repeat;

      filter: blur(7px);
      transform: scale(1.05);
      opacity: 0.18;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;

      background:
        radial-gradient(
          circle at center,
          transparent 20%,
          rgba(0, 0, 0, 0.48) 100%
        );

      z-index: -1;
    }

    .contact-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .virtual-card {
      position: relative;
      width: 100%;
      max-width: 480px;
      padding: 40px 30px 30px;
      overflow: hidden;
      text-align: center;

      background:
        linear-gradient(
          145deg,
          rgba(15, 40, 64, 0.88),
          rgba(8, 26, 43, 0.82)
        );

      border: 1px solid rgba(212, 176, 106, 0.55);
      border-radius: 22px;

      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.48),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);

      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      animation: cardEnter 0.85s ease both;
    }

    .virtual-card::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      top: -120px;
      right: -110px;
      border-radius: 50%;

      background:
        radial-gradient(
          circle,
          rgba(212, 176, 106, 0.22),
          rgba(212, 176, 106, 0) 68%
        );

      pointer-events: none;
    }

    .virtual-card::after {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      bottom: -1px;
      height: 1px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(212, 176, 106, 0.9),
          transparent
        );
    }

    .profile-photo-wrap {
      width: 126px;
      height: 126px;
      margin: 0 auto 18px;
      padding: 4px;

      border-radius: 50%;
      background:
        linear-gradient(
          135deg,
          #f0c56f,
          #8e6a2c,
          #f0c56f
        );

      box-shadow:
        0 0 0 7px rgba(212, 176, 106, 0.08),
        0 0 35px rgba(212, 176, 106, 0.28);
    }

    .profile-photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      border-radius: 50%;
      border: 4px solid #0b1f33;
    }

    .virtual-logo {
      width: 82px;
      height: auto;
      display: block;
      margin: 0 auto 14px;
      object-fit: contain;

      filter:
        drop-shadow(0 5px 12px rgba(0, 0, 0, 0.32));
    }

    .virtual-card h1 {
      margin: 0;
      color: #ffffff;

      font-family: "Parisienne", cursive;
      font-size: clamp(45px, 11vw, 62px);
      font-weight: 400;
      line-height: 1;

      text-shadow:
        0 3px 14px rgba(0, 0, 0, 0.45);
    }

    .profession {
      margin: 13px 0 7px;
      color: #f1c56c;

      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .crea {
      margin: 0;
      color: #dce3ea;

      font-size: 12px;
      letter-spacing: 1.2px;
    }

    .divider {
      position: relative;
      width: 120px;
      height: 1px;
      margin: 26px auto;

      background:
        linear-gradient(
          90deg,
          transparent,
          #d4b06a,
          transparent
        );
    }

    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;

      width: 7px;
      height: 7px;

      border-radius: 50%;
      background: #f1c56c;

      transform: translate(-50%, -50%);
      box-shadow: 0 0 16px rgba(241, 197, 108, 0.9);
    }

    .intro {
      max-width: 385px;
      margin: 0 auto 28px;

      color: #eef3f7;
      font-size: 15px;
      line-height: 1.75;

      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .contact-buttons {
      display: grid;
      gap: 13px;
    }

    .contact-buttons a {
      position: relative;
      min-height: 62px;
      padding: 11px 18px;

      display: grid;
      grid-template-columns: 36px 1fr 36px;
      align-items: center;

      color: #ffffff;
      text-decoration: none;
      text-transform: uppercase;

      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.8px;

      background:
        linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.07),
          rgba(255, 255, 255, 0.025)
        );

      border: 1px solid rgba(212, 176, 106, 0.5);
      border-radius: 15px;

      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 8px 24px rgba(0, 0, 0, 0.15);

      transition:
        transform 0.25s ease,
        border-color 0.25s ease,
        background 0.25s ease,
        box-shadow 0.25s ease;
    }

    .contact-buttons a::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;

      background:
        linear-gradient(
          110deg,
          transparent 20%,
          rgba(255, 255, 255, 0.08) 50%,
          transparent 80%
        );

      transform: translateX(-120%);
      transition: transform 0.55s ease;
      pointer-events: none;
    }

    .contact-buttons a:hover {
      transform: translateY(-3px);

      background:
        linear-gradient(
          145deg,
          rgba(212, 176, 106, 0.22),
          rgba(212, 176, 106, 0.08)
        );

      border-color: #f0c56f;

      box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.26),
        0 0 24px rgba(212, 176, 106, 0.12);
    }

    .contact-buttons a:hover::before {
      transform: translateX(120%);
    }

    .contact-buttons a i:first-child {
      color: #f0c56f;
      font-size: 24px;
      justify-self: start;
    }

    .contact-buttons a .arrow {
      color: #f0c56f;
      font-size: 19px;
      justify-self: end;

      transition: transform 0.25s ease;
    }

    .contact-buttons a:hover .arrow {
      transform: translateX(4px);
    }

    .back-site {
      margin-top: 27px;
    }

    .back-site a {
      color: #d7dee5;
      font-size: 12px;
      letter-spacing: 1.3px;
      text-decoration: none;
      text-transform: uppercase;

      transition: color 0.25s ease;
    }

    .back-site a:hover {
      color: #f0c56f;
    }

    .virtual-footer {
      margin: 22px 0 0;
      color: #9eabb7;

      font-size: 11px;
      letter-spacing: 0.7px;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 520px) {
      .contact-page {
        align-items: flex-start;
        padding: 18px 12px;
      }

      .virtual-card {
        padding: 30px 18px 24px;
        border-radius: 18px;
      }

      .profile-photo-wrap {
        width: 112px;
        height: 112px;
      }

      .virtual-logo {
        width: 72px;
      }

      .virtual-card h1 {
        font-size: 47px;
      }

      .profession {
        font-size: 11px;
        letter-spacing: 3px;
      }

      .intro {
        font-size: 14px;
      }

      .contact-buttons a {
        min-height: 59px;
        grid-template-columns: 32px 1fr 32px;
        padding: 10px 15px;

        font-size: 12px;
        letter-spacing: 1.5px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .virtual-card,
      .contact-buttons a,
      .contact-buttons a::before,
      .contact-buttons a .arrow {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>

</body>
