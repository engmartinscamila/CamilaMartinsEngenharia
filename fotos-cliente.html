<!DOCTYPE html>

<head>

<link rel="icon" href="assets/logo.png" type="image/png">
    <meta name="description" content="Fotos da obra no Portal do Cliente Camila Martins Engenharia.">
    <title>Fotos da Obra | Portal do Cliente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/portal-theme.css?v=20260724-7">

<body data-area="fotos">
    <header class="topbar">
        <a href="portal.html" class="brand">
            <span class="signature">Camila Martins</span>
            <span class="brand-subtitle">Engenharia</span>

        <div class="topbar-actions">
            <a class="back-button" href="portal.html"><i class="bi bi-arrow-left"></i><span>Voltar ao portal</span></a>
            <button class="logout-button" id="logoutButton" type="button" aria-label="Sair"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </header>
    <main class="page-container">
        <header class="page-header">
            <span class="eyebrow">Registro visual</span>
            <h1 class="page-title">Fotos da Obra</h1>

        <div class="client-strip"><strong id="clientName">Cliente</strong><span id="clientProject">Portal do Cliente</span></div>
        <section class="area-panel" id="areaContent" aria-live="polite">

        </section>
        <footer class="page-footer">
            <span>© <span id="currentYear"></span> Camila Martins Engenharia</span>
            <span><i class="bi bi-shield-lock"></i> Ambiente exclusivo para clientes</span>
        </footer>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js?v=20260724-7"></script>
